let currentTemplate = 1;
let currentLang = 'en';

const builders = { 1: buildT1, 2: buildT2, 3: buildT3, 4: buildT4, 5: buildT5 };
const tClasses = { 1: 't1', 2: 't2', 3: 't3', 4: 't4', 5: 't5' };

function render() {
    const wrap = document.getElementById('cv-wrap');
    const d = DATA[currentLang];
    const tClass = tClasses[currentTemplate];
    const isMM = currentLang === 'mm';
    wrap.className = 'cv-wrap ' + tClass + (isMM ? ' mm-font' : '');
    document.getElementById('template-root').innerHTML = builders[currentTemplate](d);
}

function setTemplate(n) {
    currentTemplate = n;
    document.querySelectorAll('.tmpl-btn').forEach((b,i) => b.classList.toggle('active', i+1===n));
    render();
}

function setLang(l) {
    currentLang = l;
    document.getElementById('btn-en').classList.toggle('active', l==='en');
    document.getElementById('btn-mm').classList.toggle('active', l==='mm');
    render();
}

// Init
render();
