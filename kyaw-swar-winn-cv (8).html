function render() {
    var wrap = document.getElementById('cv-wrap');
    var d = DATA[currentLang];
    wrap.className = 'cv-wrap ' + tClasses[currentTemplate] + (currentLang === 'mm' ? ' mm-font' : '');
    document.getElementById('tmpl-root').innerHTML = builders[currentTemplate](d);
}

function setTemplate(n) {
    currentTemplate = n;
    var btns = document.querySelectorAll('.tmpl-btn');
    for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', i + 1 === n);
    }
    render();
}

function setLang(l) {
    currentLang = l;
    document.getElementById('btn-en').classList.toggle('active', l === 'en');
    document.getElementById('btn-mm').classList.toggle('active', l === 'mm');
    render();
}
